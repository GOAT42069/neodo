<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#f5f5dc" rx="12"/>
  
  <!-- Subtle Brutalist Border -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#000" stroke-width="4" rx="10"/>

  <!-- Character Design (Rounded Colorful Player) -->
  <circle cx="32" cy="32" r="20" stroke="#000" stroke-width="4" fill="url(#blueGrad)"/>
  <circle cx="20" cy="20" r="6" fill="#fff" opacity="0.3"/>

  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0062ff;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
